<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>우리 동네 아파트 실거래가 대시보드</title>
    
    <!-- Tailwind CSS (스타일링) -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Chart.js (차트 라이브러리) -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <!-- PapaParse (CSV 파싱 라이브러리) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    
    <!-- Lucide Icons (아이콘) -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        /* 테이블 스크롤바 커스텀 스타일 */
        .table-container::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        .table-container::-webkit-scrollbar-track {
            background: #f1f5f9; 
            border-radius: 4px;
        }
        .table-container::-webkit-scrollbar-thumb {
            background: #cbd5e1; 
            border-radius: 4px;
        }
        .table-container::-webkit-scrollbar-thumb:hover {
            background: #94a3b8; 
        }
        
        /* 로딩 스피너 애니메이션 */
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .spinner {
            border: 4px solid rgba(0, 0, 0, 0.1);
            border-left-color: #10b981;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 font-sans min-h-screen">

    <!-- 로딩 오버레이 -->
    <div id="loadingOverlay" class="fixed inset-0 bg-white z-50 flex flex-col items-center justify-center transition-opacity duration-300">
        <div class="spinner mb-4"></div>
        <h2 class="text-xl font-semibold text-slate-700">데이터를 불러오는 중입니다...</h2>
        <p class="text-slate-500 mt-2 text-sm">잠시만 기다려주세요.</p>
    </div>

    <!-- Toast 알림 (메시지 박스) -->
    <div id="toastMessage" class="fixed bottom-4 right-4 bg-slate-800 text-white px-4 py-3 rounded shadow-lg transform translate-y-20 opacity-0 transition-all duration-300 z-50 flex items-center gap-2">
        <i data-lucide="check-circle" class="w-5 h-5 text-emerald-400"></i>
        <span id="toastText">메시지</span>
    </div>

    <!-- 메인 컨테이너 -->
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8" id="mainContent" style="display: none;">
        
        <!-- 헤더 영역 (필터 추가됨) -->
        <header class="mb-8 flex flex-col md:flex-row md:items-center md:justify-between gap-4">
            <div>
                <h1 class="text-3xl font-bold text-slate-900 flex items-center gap-3">
                    <i data-lucide="building-2" class="w-8 h-8 text-emerald-600"></i>
                    우리 동네 아파트 실거래가 대시보드
                </h1>
                <p class="mt-2 text-sm text-slate-500">최근 업데이트된 아파트 실거래가 현황 및 통계입니다.</p>
            </div>
            
            <!-- 동네(법정동) 필터 영역 -->
            <div class="flex items-center gap-2 bg-white px-4 py-2 rounded-xl border border-slate-200 shadow-sm">
                <label for="dongFilter" class="text-sm font-bold text-slate-700 whitespace-nowrap flex items-center gap-2">
                    <i data-lucide="map-pin" class="w-4 h-4 text-emerald-600"></i>
                    동네 필터
                </label>
                <select id="dongFilter" class="bg-slate-50 border border-slate-200 text-slate-900 text-sm rounded-lg focus:ring-emerald-500 focus:border-emerald-500 block w-40 p-2 outline-none cursor-pointer font-medium transition-colors hover:bg-slate-100">
                    <option value="전체">전체 동네 보기</option>
                    <!-- JavaScript로 동 목록이 추가됩니다 -->
                </select>
            </div>
        </header>

        <!-- 요약 카드 섹션 -->
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 mb-8">
            <!-- 전체 거래 건수 -->
            <div class="bg-white rounded-xl shadow-sm border border-slate-200 p-6 flex items-center">
                <div class="p-3 rounded-lg bg-emerald-50 mr-4 text-2xl leading-none">
                    🏠
                </div>
                <div>
                    <p class="text-sm font-medium text-slate-500">전체 거래 건수</p>
                    <p class="text-2xl font-bold text-emerald-800" id="totalCount">0건</p>
                </div>
            </div>
            
            <!-- 평균 거래가격 -->
            <div class="bg-white rounded-xl shadow-sm border border-slate-200 p-6 flex items-center">
                <div class="p-3 rounded-lg bg-emerald-50 mr-4 text-2xl leading-none">
                    💰
                </div>
                <div>
                    <p class="text-sm font-medium text-slate-500">평균 거래가격</p>
                    <p class="text-2xl font-bold text-emerald-800" id="avgPrice">0원</p>
                </div>
            </div>

            <!-- 최고 거래가격 -->
            <div class="bg-white rounded-xl shadow-sm border border-slate-200 p-6 flex items-center">
                <div class="p-3 rounded-lg bg-emerald-50 mr-4 text-2xl leading-none">
                    📈
                </div>
                <div>
                    <p class="text-sm font-medium text-slate-500">최고 거래가격</p>
                    <p class="text-2xl font-bold text-emerald-800" id="maxPrice">0원</p>
                </div>
            </div>

            <!-- 최저 거래가격 -->
            <div class="bg-white rounded-xl shadow-sm border border-slate-200 p-6 flex items-center">
                <div class="p-3 rounded-lg bg-emerald-50 mr-4 text-2xl leading-none">
                    📉
                </div>
                <div>
                    <p class="text-sm font-medium text-slate-500">최저 거래가격</p>
                    <p class="text-2xl font-bold text-emerald-800" id="minPrice">0원</p>
                </div>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <!-- 차트 섹션 -->
            <div class="lg:col-span-2 bg-white rounded-xl shadow-sm border border-slate-200 p-6">
                <h3 class="text-lg font-bold text-slate-800 mb-4 flex items-center gap-2">
                    <i data-lucide="bar-chart-3" class="w-5 h-5 text-slate-500"></i>
                    월별 평균 거래가격 (만원)
                </h3>
                <div class="w-full h-[400px] relative">
                    <canvas id="priceChart"></canvas>
                </div>
            </div>

            <!-- 거래 목록 테이블 섹션 -->
            <div class="lg:col-span-1 bg-white rounded-xl shadow-sm border border-slate-200 p-0 overflow-hidden flex flex-col h-[400px] lg:h-auto">
                <div class="p-6 border-b border-slate-200 bg-slate-50 flex justify-between items-center">
                    <h3 class="text-lg font-bold text-slate-800 flex items-center gap-2">
                        <i data-lucide="list" class="w-5 h-5 text-slate-500"></i>
                        최근 거래 목록
                    </h3>
                    <div class="flex items-center gap-2">
                        <button id="copyDataBtn" class="text-xs bg-emerald-600 hover:bg-emerald-700 text-white px-3 py-1.5 rounded flex items-center gap-1 transition-colors shadow-sm">
                            <i data-lucide="copy" class="w-3 h-3"></i>
                            데이터 복사
                        </button>
                        <span class="text-xs text-slate-500 bg-slate-200 px-2 py-1 rounded">최신순</span>
                    </div>
                </div>
                <div class="overflow-y-auto table-container flex-grow">
                    <table class="min-w-full text-left text-sm whitespace-nowrap">
                        <thead class="uppercase tracking-wider border-b-2 border-slate-200 bg-white sticky top-0 z-10">
                            <tr>
                                <th scope="col" class="px-6 py-4 font-semibold text-slate-600">계약일/단지명</th>
                                <th scope="col" class="px-6 py-4 font-semibold text-slate-600 text-right">거래금액/면적</th>
                            </tr>
                        </thead>
                        <tbody id="tableBody" class="divide-y divide-slate-100 bg-white">
                            <!-- JS를 통해 동적 생성됨 -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Lucide 아이콘 초기화
        lucide.createIcons();

        // 제공된 구글 시트 CSV 데이터 URL
        const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vT3YUN6h_6GuimSjASYrTLlo-hcNRObrTIApeNC8teM3upNRKlMhh0oeJAr8n0TNSGT-HMOOvF48Tdi/pub?gid=876597433&single=true&output=csv';

        let chartInstance = null;
        let globalProcessedData = []; // 원본 전체 데이터
        let currentFilteredData = []; // 현재 화면에 보이는 (필터링된) 데이터

        // 토스트 알림 표시 함수 (alert 대체)
        function showToast(message, isError = false) {
            const toast = document.getElementById('toastMessage');
            const toastText = document.getElementById('toastText');
            const icon = toast.querySelector('i');
            
            toastText.innerText = message;
            
            if (isError) {
                icon.setAttribute('data-lucide', 'alert-circle');
                icon.classList.replace('text-emerald-400', 'text-rose-400');
            } else {
                icon.setAttribute('data-lucide', 'check-circle');
                icon.classList.replace('text-rose-400', 'text-emerald-400');
            }
            lucide.createIcons();
            
            toast.classList.remove('translate-y-20', 'opacity-0');
            
            setTimeout(() => {
                toast.classList.add('translate-y-20', 'opacity-0');
            }, 3000);
        }

        // 데이터 클립보드 복사 함수 (필터링된 데이터 기준)
        function copyDataToClipboard() {
            if (currentFilteredData.length === 0) {
                showToast('복사할 데이터가 없습니다.', true);
                return;
            }

            // 헤더 생성 (탭으로 구분)
            let textToCopy = "계약일\t아파트명\t법정동\t전용면적(㎡)\t층\t건축년도\t거래금액(만원)\n";

            // 데이터 행 추가
            currentFilteredData.forEach(item => {
                textToCopy += `${item.rawDate}\t${item.name}\t${item.dong}\t${item.area}\t${item.floor}\t${item.year}\t${item.price}\n`;
            });

            // 임시 textarea 생성 및 복사 처리
            const textarea = document.createElement('textarea');
            textarea.value = textToCopy;
            textarea.style.position = 'fixed';
            textarea.style.left = '-9999px';
            document.body.appendChild(textarea);
            textarea.select();
            
            try {
                document.execCommand('copy');
                showToast('현재 화면의 데이터가 복사되었습니다. (엑셀에 붙여넣기 가능)');
            } catch (err) {
                console.error('복사 실패:', err);
                showToast('데이터 복사에 실패했습니다.', true);
            } finally {
                document.body.removeChild(textarea);
            }
        }

        // 금액(만원)을 읽기 쉬운 한글 포맷(억, 만)으로 변환하는 함수
        function formatKoreanCurrency(manwon) {
            if (isNaN(manwon) || manwon === 0) return '-';
            
            const uk = Math.floor(manwon / 10000);
            const man = manwon % 10000;
            
            let result = '';
            if (uk > 0) result += `${uk}억 `;
            if (man > 0) result += `${man.toLocaleString()}`;
            else if (uk > 0) result = result.trim(); // 딱 떨어지는 억 단위
            
            return result.trim() + (uk === 0 && man > 0 ? '만원' : '');
        }

        // CSV 데이터 가져오기 및 파싱
        async function fetchData() {
            try {
                const response = await fetch(CSV_URL);
                if (!response.ok) throw new Error('네트워크 응답이 올바르지 않습니다.');
                const csvText = await response.text();

                // PapaParse를 이용한 CSV 파싱
                Papa.parse(csvText, {
                    header: true,
                    skipEmptyLines: true,
                    complete: function(results) {
                        processData(results.data);
                    },
                    error: function(err) {
                        console.error('CSV Parsing Error:', err);
                        showToast('데이터 파싱 중 오류가 발생했습니다.', true);
                    }
                });
            } catch (error) {
                console.error('Fetch Error:', error);
                showToast('데이터를 불러오는데 실패했습니다.', true);
                document.getElementById('loadingOverlay').style.display = 'none';
            }
        }

        // 데이터 정제 및 초기화
        function processData(rawData) {
            let processedData = [];
            let uniqueDongs = new Set(); // 동네 목록 추출용 Set
            
            // 1. 데이터 클렌징 및 정제
            rawData.forEach(row => {
                const getVal = (key) => {
                    for(let k in row) {
                        if(k.trim() === key) return row[k].trim();
                    }
                    return '';
                };

                const dateStr = getVal('거래일자');
                const priceStr = getVal('거래금액(만원)').replace(/,/g, ''); // 콤마 제거
                const price = parseInt(priceStr, 10);
                const name = getVal('아파트명');
                const dong = getVal('법정동');
                const area = getVal('전용면적(㎡)');
                const floor = getVal('층');
                const year = getVal('건축년도');

                if (!dateStr || isNaN(price)) return; // 유효하지 않은 행 무시

                // 법정동 목록에 추가
                if (dong) {
                    uniqueDongs.add(dong);
                }

                // YYYY-MM 형식 추출 (다양한 날짜 포맷 대응)
                let month = 'Unknown';
                const cleanDate = dateStr.replace(/[^0-9]/g, ''); 
                if (cleanDate.length >= 6) {
                    month = `${cleanDate.substring(0,4)}-${cleanDate.substring(4,6)}`;
                }

                processedData.push({
                    rawDate: dateStr,
                    month: month,
                    name: name,
                    dong: dong,
                    area: area,
                    floor: floor,
                    price: price, // 만원 단위 숫자
                    year: year
                });
            });

            // 날짜 내림차순 정렬 (최신순)
            processedData.sort((a, b) => b.rawDate.localeCompare(a.rawDate));
            globalProcessedData = processedData;

            if(globalProcessedData.length === 0) {
                showToast('유효한 데이터가 없습니다.', true);
                document.getElementById('loadingOverlay').style.display = 'none';
                return;
            }

            // 2. 동네(법정동) 필터 드롭다운 옵션 추가
            const dongFilterSelect = document.getElementById('dongFilter');
            const sortedDongs = Array.from(uniqueDongs).sort();
            
            sortedDongs.forEach(dong => {
                const option = document.createElement('option');
                option.value = dong;
                option.textContent = dong;
                dongFilterSelect.appendChild(option);
            });

            // 필터 변경 시 대시보드 업데이트 이벤트 리스너 등록
            dongFilterSelect.addEventListener('change', (e) => {
                updateDashboard(e.target.value);
            });

            // 3. 초기 대시보드 화면 렌더링 (전체 데이터)
            updateDashboard('전체');

            // 4. 로딩 종료 및 화면 표시
            document.getElementById('loadingOverlay').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('loadingOverlay').style.display = 'none';
                document.getElementById('mainContent').style.display = 'block';
            }, 300);
        }

        // 선택된 동네에 맞게 대시보드를 업데이트하는 함수
        function updateDashboard(selectedDong) {
            // 필터링 적용
            if (selectedDong === '전체') {
                currentFilteredData = globalProcessedData;
            } else {
                currentFilteredData = globalProcessedData.filter(item => item.dong === selectedDong);
            }

            const totalCount = currentFilteredData.length;

            // 데이터가 없는 경우 처리
            if (totalCount === 0) {
                document.getElementById('totalCount').innerText = '0건';
                document.getElementById('avgPrice').innerText = '-';
                document.getElementById('maxPrice').innerText = '-';
                document.getElementById('minPrice').innerText = '-';
                renderChart([], []);
                renderTable([]);
                return;
            }

            // 통계 계산 (요약 카드용)
            let totalPrice = 0;
            let maxPrice = Number.MIN_SAFE_INTEGER;
            let minPrice = Number.MAX_SAFE_INTEGER;

            // 월별 통계 집계용 객체
            const monthlyStats = {};

            currentFilteredData.forEach(item => {
                totalPrice += item.price;
                if (item.price > maxPrice) maxPrice = item.price;
                if (item.price < minPrice) minPrice = item.price;

                // 월별 집계
                if (!monthlyStats[item.month]) {
                    monthlyStats[item.month] = { sum: 0, count: 0 };
                }
                monthlyStats[item.month].sum += item.price;
                monthlyStats[item.month].count += 1;
            });

            const avgPrice = Math.round(totalPrice / totalCount);

            // UI 업데이트 - 요약 카드
            document.getElementById('totalCount').innerText = `${totalCount.toLocaleString()}건`;
            document.getElementById('avgPrice').innerText = formatKoreanCurrency(avgPrice);
            document.getElementById('maxPrice').innerText = formatKoreanCurrency(maxPrice);
            document.getElementById('minPrice').innerText = formatKoreanCurrency(minPrice);

            // 차트 데이터 준비 및 렌더링
            const sortedMonths = Object.keys(monthlyStats).sort();
            const chartLabels = sortedMonths;
            const chartData = sortedMonths.map(month => {
                return Math.round(monthlyStats[month].sum / monthlyStats[month].count);
            });

            renderChart(chartLabels, chartData);

            // 테이블 렌더링
            renderTable(currentFilteredData);
        }

        // 차트 렌더링 (Chart.js)
        function renderChart(labels, data) {
            const ctx = document.getElementById('priceChart').getContext('2d');
            
            if(chartInstance) {
                chartInstance.destroy(); // 기존 차트가 있다면 파괴 후 재생성
            }

            chartInstance = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{
                        label: '평균 거래가격 (만원)',
                        data: data,
                        borderColor: '#10b981', // Tailwind emerald-500
                        backgroundColor: 'rgba(16, 185, 129, 0.1)',
                        borderWidth: 2,
                        pointBackgroundColor: '#ffffff',
                        pointBorderColor: '#10b981',
                        pointBorderWidth: 2,
                        pointRadius: 4,
                        pointHoverRadius: 6,
                        fill: true,
                        tension: 0.3 // 부드러운 곡선
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { display: false },
                        tooltip: {
                            callbacks: {
                                label: function(context) {
                                    let label = context.dataset.label || '';
                                    if (label) {
                                        label += ': ';
                                    }
                                    if (context.parsed.y !== null) {
                                        label += formatKoreanCurrency(context.parsed.y);
                                    }
                                    return label;
                                }
                            }
                        }
                    },
                    scales: {
                        y: {
                            beginAtZero: false,
                            grid: {
                                color: '#f1f5f9',
                                drawBorder: false
                            },
                            ticks: {
                                callback: function(value) {
                                    return value.toLocaleString(); // Y축은 만원 단위 숫자 콤마로 표시
                                },
                                font: { family: "'Pretendard', sans-serif", size: 12 },
                                color: '#64748b'
                            }
                        },
                        x: {
                            grid: { display: false },
                            ticks: {
                                font: { family: "'Pretendard', sans-serif", size: 12 },
                                color: '#64748b'
                            }
                        }
                    },
                    interaction: {
                        intersect: false,
                        mode: 'index',
                    },
                }
            });
        }

        // 테이블 렌더링
        function renderTable(data) {
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = '';

            // 최대 100개까지만 표시하여 브라우저 부하 방지
            const displayData = data.slice(0, 100);

            if (displayData.length === 0) {
                const tr = document.createElement('tr');
                tr.innerHTML = `<td colspan="2" class="px-6 py-10 text-center text-slate-500">선택한 동네의 거래 내역이 없습니다.</td>`;
                tbody.appendChild(tr);
                return;
            }

            displayData.forEach(item => {
                const tr = document.createElement('tr');
                tr.className = 'hover:bg-slate-50 transition-colors duration-150';
                
                tr.innerHTML = `
                    <td class="px-6 py-4">
                        <div class="flex flex-col">
                            <span class="text-xs text-slate-500 mb-1">${item.rawDate}</span>
                            <span class="font-bold text-slate-800 text-base">${item.name}</span>
                            <span class="text-xs text-slate-400 mt-1">${item.dong} · ${item.year ? item.year+'년' : '-'}</span>
                        </div>
                    </td>
                    <td class="px-6 py-4 text-right">
                        <div class="flex flex-col items-end">
                            <span class="font-bold text-emerald-600 text-lg">${formatKoreanCurrency(item.price)}</span>
                            <span class="text-sm text-slate-500 mt-1 bg-slate-100 px-2 py-0.5 rounded">${item.area}㎡ · ${item.floor}층</span>
                        </div>
                    </td>
                `;
                tbody.appendChild(tr);
            });
            
            if(data.length > 100) {
                 const tr = document.createElement('tr');
                 tr.innerHTML = `<td colspan="2" class="px-6 py-4 text-center text-sm text-slate-500">최신 100건의 데이터만 표시됩니다.</td>`;
                 tbody.appendChild(tr);
            }
        }

        // 초기화 실행
        window.addEventListener('DOMContentLoaded', () => {
            fetchData();
            
            // 데이터 복사 버튼 이벤트 리스너
            document.getElementById('copyDataBtn').addEventListener('click', copyDataToClipboard);
        });

    </script>
</body>
</html>
